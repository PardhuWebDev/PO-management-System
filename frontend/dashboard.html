<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PO Management — Dashboard</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- Nav -->
  <nav class="nav">
    <a class="nav-brand" href="dashboard.html">PO<span>Manager</span></a>
    <div class="nav-right">
      <div class="nav-user" id="navUser">
        <span id="navUserName">Loading...</span>
      </div>
      <a href="index.html" class="btn btn-outline btn-sm">Sign out</a>
    </div>
  </nav>

  <main class="page">
    <!-- Header -->
    <div class="page-header">
      <h1 class="page-title"><span>//</span> Purchase Orders</h1>
      <a href="create_po.html" class="btn btn-primary">+ New PO</a>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="stat-label">Total Orders</div>
        <div class="stat-value" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Draft</div>
        <div class="stat-value" id="statDraft" style="color:var(--muted)">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Confirmed</div>
        <div class="stat-value" id="statConfirmed" style="color:var(--accent)">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Value</div>
        <div class="stat-value" id="statValue" style="color:var(--green)">—</div>
      </div>
    </div>

    <!-- Table -->
    <div class="card">
      <div class="table-wrap">
        <table id="ordersTable">
          <thead>
            <tr>
              <th>Reference</th>
              <th>Vendor</th>
              <th>Items</th>
              <th>Subtotal</th>
              <th>Tax (5%)</th>
              <th>Total</th>
              <th>Status</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="ordersBody">
            <tr>
              <td colspan="9">
                <div class="loading-center"><div class="spinner"></div></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="toast"></div>

  <script>
    const API = 'http://localhost:8000';

    // ── Toast ──────────────────────────────────────────────
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `show ${type}`;
      setTimeout(() => t.className = '', 3000);
    }

    // ── Badge ──────────────────────────────────────────────
    function badge(status) {
      const map = {
        Draft: 'badge-draft', Confirmed: 'badge-confirmed',
        Received: 'badge-received', Cancelled: 'badge-cancelled'
      };
      return `<span class="badge ${map[status] || 'badge-draft'}">${status}</span>`;
    }

    // ── Format currency ────────────────────────────────────
    function fmt(n) { return '$' + parseFloat(n).toFixed(2); }

    // ── Format date ────────────────────────────────────────
    function fmtDate(d) {
      return new Date(d).toLocaleDateString('en-IN', {
        day: '2-digit', month: 'short', year: 'numeric'
      });
    }

    // ── Status update ──────────────────────────────────────
    async function updateStatus(id, status) {
      try {
        const res = await fetch(`${API}/orders/${id}/status`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
        if (!res.ok) throw new Error();
        showToast(`Status updated to ${status}`);
        loadOrders();
      } catch {
        showToast('Failed to update status', 'error');
      }
    }

    // ── Delete order ───────────────────────────────────────
    async function deleteOrder(id) {
      if (!confirm('Delete this purchase order?')) return;
      try {
        const res = await fetch(`${API}/orders/${id}`, { method: 'DELETE' });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail);
        }
        showToast('Order deleted');
        loadOrders();
      } catch(e) {
        showToast(e.message || 'Cannot delete order', 'error');
      }
    }

    // ── Render orders ──────────────────────────────────────
    function renderOrders(orders) {
      const tbody = document.getElementById('ordersBody');

      if (!orders.length) {
        tbody.innerHTML = `<tr><td colspan="9">
          <div class="empty-state">No purchase orders yet. <a href="create_po.html" style="color:var(--accent)">Create one →</a></div>
        </td></tr>`;
        return;
      }

      tbody.innerHTML = orders.map(o => `
        <tr>
          <td><code style="color:var(--accent);font-size:0.8rem">${o.reference_no}</code></td>
          <td>${o.vendor.name}</td>
          <td style="color:var(--muted)">${o.items.length} item(s)</td>
          <td>${fmt(o.subtotal)}</td>
          <td style="color:var(--yellow)">${fmt(o.tax_amount)}</td>
          <td style="font-weight:600">${fmt(o.total_amount)}</td>
          <td>${badge(o.status)}</td>
          <td style="color:var(--muted);font-size:0.8rem">${fmtDate(o.created_at)}</td>
          <td>
            <div style="display:flex;gap:0.4rem;align-items:center">
              <select onchange="updateStatus(${o.id}, this.value)"
                style="padding:0.25rem 0.4rem;font-size:0.75rem;width:auto">
                ${['Draft','Confirmed','Received','Cancelled'].map(s =>
                  `<option ${s===o.status?'selected':''}>${s}</option>`
                ).join('')}
              </select>
              <button class="btn btn-danger btn-sm" onclick="deleteOrder(${o.id})">✕</button>
            </div>
          </td>
        </tr>
      `).join('');

      // Stats
      document.getElementById('statTotal').textContent     = orders.length;
      document.getElementById('statDraft').textContent     = orders.filter(o=>o.status==='Draft').length;
      document.getElementById('statConfirmed').textContent = orders.filter(o=>o.status==='Confirmed').length;
      const total = orders.reduce((s,o) => s + parseFloat(o.total_amount), 0);
      document.getElementById('statValue').textContent     = fmt(total);
    }

    // ── Load orders ────────────────────────────────────────
    async function loadOrders() {
      try {
        const res  = await fetch(`${API}/orders/`);
        const data = await res.json();
        renderOrders(data);
      } catch {
        document.getElementById('ordersBody').innerHTML =
          `<tr><td colspan="9"><div class="empty-state">Failed to connect to API</div></td></tr>`;
      }
    }

    // ── Load user from JWT if present ──────────────────────
    function loadUser() {
      const hash  = window.location.hash;
      const match = hash.match(/token=([^&]+)/);
      if (match) {
        localStorage.setItem('token', match[1]);
        history.replaceState(null, '', window.location.pathname);
      }
      const token = localStorage.getItem('token');
      if (token) {
        fetch(`${API}/auth/me?token=${token}`)
          .then(r => r.json())
          .then(u => {
            document.getElementById('navUserName').textContent = u.name || u.email;
          })
          .catch(() => {});
      } else {
        document.getElementById('navUserName').textContent = 'Dev Mode';
      }
    }

    loadUser();
    loadOrders();
  </script>
</body>
</html>
