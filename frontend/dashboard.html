<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PO Management — Dashboard</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <nav class="nav">
    <a class="nav-brand" href="dashboard.html"><div class="nav-brand-dot"></div>PO Manager</a>
    <div class="nav-right">
      <div class="nav-user" id="navUser"><span id="navUserName">—</span></div>
      <a href="index.html" class="btn btn-outline btn-sm">Sign out</a>
    </div>
  </nav>
  <main class="page">
    <div class="page-header">
      <h1 class="page-title"><span class="page-title-prefix">//</span> Purchase Orders</h1>
      <a href="create_po.html" class="btn btn-primary">+ New Order</a>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Total Orders</div><div class="stat-value" id="statTotal">—</div></div>
      <div class="stat-card"><div class="stat-label">Draft</div><div class="stat-value" id="statDraft" style="color:var(--muted)">—</div></div>
      <div class="stat-card"><div class="stat-label">Confirmed</div><div class="stat-value" id="statConfirmed" style="color:var(--accent)">—</div></div>
      <div class="stat-card"><div class="stat-label">Total Value</div><div class="stat-value" id="statValue" style="color:var(--green)">—</div></div>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Reference</th><th>Vendor</th><th>Items</th><th>Subtotal</th><th>Tax 5%</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr>
          </thead>
          <tbody id="ordersBody">
            <tr><td colspan="9"><div class="loading-center"><div class="spinner"></div> Loading orders...</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
  <div id="toast"></div>
  <script>
    const API='http://localhost:8000';
    function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='show '+type;setTimeout(()=>t.className='',3000);}
    function badge(s){const m={Draft:'badge-draft',Confirmed:'badge-confirmed',Received:'badge-received',Cancelled:'badge-cancelled'};return '<span class="badge '+(m[s]||'badge-draft')+'">'+s+'</span>';}
    function fmt(n){return'$'+parseFloat(n).toFixed(2);}
    function fmtDate(d){return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
    async function updateStatus(id,status){try{const res=await fetch(API+'/orders/'+id+'/status',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});if(!res.ok)throw new Error();showToast('Status → '+status);loadOrders();}catch{showToast('Failed to update','error');}}
    async function deleteOrder(id){if(!confirm('Delete this purchase order?'))return;try{const res=await fetch(API+'/orders/'+id,{method:'DELETE'});if(!res.ok){const e=await res.json();throw new Error(e.detail);}showToast('Order deleted');loadOrders();}catch(e){showToast(e.message||'Cannot delete','error');}}
    function renderOrders(orders){
      const tbody=document.getElementById('ordersBody');
      if(!orders.length){tbody.innerHTML='<tr><td colspan="9"><div class="empty-state">No purchase orders yet.<br><a href="create_po.html" style="color:var(--accent)">Create your first order →</a></div></td></tr>';return;}
      tbody.innerHTML=orders.map((o,i)=>'<tr style="animation:fadeUp 0.3s ease '+(i*0.04)+'s both"><td><code style="color:var(--accent);font-size:0.78rem;background:var(--accent-dim);padding:0.2rem 0.5rem;border-radius:4px">'+o.reference_no+'</code></td><td>'+o.vendor.name+'</td><td style="color:var(--muted)">'+o.items.length+'</td><td>'+fmt(o.subtotal)+'</td><td style="color:var(--yellow)">'+fmt(o.tax_amount)+'</td><td style="font-weight:600;color:var(--text)">'+fmt(o.total_amount)+'</td><td>'+badge(o.status)+'</td><td style="color:var(--muted);font-size:0.8rem">'+fmtDate(o.created_at)+'</td><td><div style="display:flex;gap:0.4rem;align-items:center"><select onchange="updateStatus('+o.id+',this.value)" style="padding:0.25rem 0.5rem;font-size:0.75rem;width:auto;border-radius:6px">'+['Draft','Confirmed','Received','Cancelled'].map(s=>'<option '+(s===o.status?'selected':'')+'>'+s+'</option>').join('')+'</select><button class="btn btn-danger" onclick="deleteOrder('+o.id+')">✕</button></div></td></tr>').join('');
      document.getElementById('statTotal').textContent=orders.length;
      document.getElementById('statDraft').textContent=orders.filter(o=>o.status==='Draft').length;
      document.getElementById('statConfirmed').textContent=orders.filter(o=>o.status==='Confirmed').length;
      document.getElementById('statValue').textContent=fmt(orders.reduce((s,o)=>s+parseFloat(o.total_amount),0));
    }
    async function loadOrders(){try{const data=await fetch(API+'/orders/').then(r=>r.json());renderOrders(data);}catch{document.getElementById('ordersBody').innerHTML='<tr><td colspan="9"><div class="empty-state">Failed to connect to API.<br>Is Docker running?</div></td></tr>';}}
    function loadUser(){const match=window.location.hash.match(/token=([^&]+)/);if(match){localStorage.setItem('token',match[1]);history.replaceState(null,'',location.pathname);}const token=localStorage.getItem('token');if(token){fetch(API+'/auth/me?token='+token).then(r=>r.json()).then(u=>document.getElementById('navUserName').textContent=u.name||u.email).catch(()=>{});}else{document.getElementById('navUserName').textContent='Dev Mode';}}
    loadUser();loadOrders();
  </script>
</body>
</html>
