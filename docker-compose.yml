version: "3.9"

services:

  db:
    image: postgres:15
    container_name: po_postgres
    restart: always
    environment:
      POSTGRES_USER: po_user
      POSTGRES_PASSWORD: po_pass
      POSTGRES_DB: po_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql  # auto-runs on first start

  backend:
    build: ./backend
    container_name: po_backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://po_user:po_pass@db:5432/po_db
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/app   # hot reload in dev

volumes:
  postgres_data: